<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Allergen Detector</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --border-color: #444;
      --bg: #1a1a2e;
      --surface: #16213e;
      --text: #e0e0e0;
      --accent: #0f3460;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 1rem;
      text-align: center;
      background: var(--surface);
      border-bottom: 1px solid #333;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 600;
    }

    main {
      width: 100%;
      max-width: 640px;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      flex: 1;
    }

    /* Camera viewport */
    .camera-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      border: 4px solid var(--border-color);
      border-radius: 12px;
      overflow: hidden;
      background: #000;
      transition: border-color 0.3s ease;
    }

    .camera-wrap.safe {
      border-color: #2ecc71;
      box-shadow: 0 0 20px rgba(46, 204, 113, 0.3);
    }

    .camera-wrap.danger {
      border-color: #e74c3c;
      border-width: 6px;
      box-shadow: 0 0 24px rgba(231, 76, 60, 0.5);
    }

    .camera-wrap.drag-over {
      border-color: #5dade2;
      border-style: dashed;
      box-shadow: 0 0 20px rgba(93, 173, 226, 0.4);
    }

    .drag-hint {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: rgba(0, 0, 0, 0.55);
      color: #5dade2;
      font-size: 1.1rem;
      font-weight: 600;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 10;
    }

    .camera-wrap.drag-over .drag-hint {
      opacity: 1;
    }

    .drag-hint svg {
      width: 48px;
      height: 48px;
      stroke: #5dade2;
    }

    video,
    .camera-wrap canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .camera-wrap canvas {
      display: none;
    }

    .camera-wrap.frozen video {
      display: none;
    }

    .camera-wrap.frozen canvas {
      display: block;
    }

    /* Controls */
    .controls {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .controls button {
      flex: 1;
      min-width: 120px;
      padding: 0.75rem 1rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .controls button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #btnScan {
      background: #e74c3c;
      color: #fff;
    }

    #btnUpload {
      background: var(--accent);
      color: #fff;
    }

    #btnRescan {
      background: #e67e22;
      color: #fff;
    }

    #btnReset {
      background: #555;
      color: #fff;
    }

    #fileInput {
      display: none;
    }

    .controls .hidden {
      display: none;
    }

    /* Status */
    .status {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      background: var(--surface);
      font-size: 0.95rem;
      line-height: 1.5;
      min-height: 3rem;
    }

    /* Results */
    .results {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      background: var(--surface);
      display: none;
    }

    .results.visible {
      display: block;
    }

    .results h3 {
      margin-bottom: 0.5rem;
      font-size: 1rem;
    }

    .tag {
      display: inline-block;
      padding: 0.25rem 0.6rem;
      margin: 0.2rem;
      border-radius: 4px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .tag.found {
      background: rgba(231, 76, 60, 0.2);
      color: #e74c3c;
      border: 1px solid #e74c3c;
    }

    .tag.clear {
      background: rgba(46, 204, 113, 0.15);
      color: #2ecc71;
      border: 1px solid #2ecc71;
    }

    /* Recognized text preview */
    .ocr-text {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      background: var(--surface);
      font-size: 0.8rem;
      line-height: 1.4;
      max-height: 8rem;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
      display: none;
    }

    .ocr-text.visible {
      display: block;
    }

    /* Smart routing step log */
    .step-log {
      display: none;
      flex-direction: column;
      gap: 0.5rem;
    }

    .step-log.visible {
      display: flex;
    }

    .step-entry {
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      background: var(--surface);
      border-left: 3px solid #444;
      font-size: 0.85rem;
    }

    .step-entry.running {
      border-left-color: #e67e22;
    }

    .step-entry.found {
      border-left-color: #e74c3c;
    }

    .step-entry.clear {
      border-left-color: #2ecc71;
    }

    .step-entry.error {
      border-left-color: #888;
    }

    .step-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .step-model {
      font-weight: 600;
    }

    .step-meta {
      font-size: 0.75rem;
      color: #888;
      display: flex;
      gap: 0.6rem;
    }

    .step-allergens {
      margin-top: 0.3rem;
    }

    .step-toggle {
      margin-top: 0.35rem;
      font-size: 0.75rem;
      color: #5dade2;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      text-align: left;
    }

    .step-toggle:hover {
      text-decoration: underline;
    }

    .step-text {
      margin-top: 0.3rem;
      font-size: 0.78rem;
      line-height: 1.35;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 6rem;
      overflow-y: auto;
      color: #aaa;
      display: none;
    }

    .step-text.visible {
      display: block;
    }

    /* Settings panels */
    details {
      background: var(--surface);
      border-radius: 8px;
      padding: 0.75rem 1rem;
    }

    details summary {
      cursor: pointer;
      font-weight: 600;
      font-size: 0.95rem;
    }

    .setting-label {
      display: block;
      margin-top: 0.6rem;
      font-size: 0.8rem;
      color: #888;
    }

    details select {
      margin-top: 0.3rem;
      width: 100%;
      padding: 0.5rem;
      border-radius: 6px;
      border: 1px solid #444;
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
      font-size: 0.85rem;
      cursor: pointer;
    }

    details input[type="password"],
    details input[type="text"] {
      margin-top: 0.3rem;
      width: 100%;
      padding: 0.5rem;
      border-radius: 6px;
      border: 1px solid #444;
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
      font-size: 0.85rem;
    }

    .key-status {
      margin-top: 0.4rem;
      font-size: 0.8rem;
      color: #888;
    }

    .key-status.ok {
      color: #2ecc71;
    }

    /* Allergen list */
    .allergen-grid {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-top: 0.75rem;
      padding-right: 0.3rem;
    }

    .allergen-item {
      border-radius: 8px;
      background: var(--bg);
      font-size: 0.9rem;
      user-select: none;
      overflow: hidden;
    }

    .allergen-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.65rem 0.75rem;
      cursor: pointer;
    }

    .allergen-header:hover {
      background: rgba(255, 255, 255, 0.04);
    }

    .allergen-item.group-disabled > .allergen-header {
      opacity: 0.4;
    }

    .allergen-header input[type="checkbox"] {
      accent-color: #e74c3c;
      width: 16px;
      height: 16px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .allergen-header .item-body {
      flex: 1;
      min-width: 0;
    }

    .allergen-header .label {
      font-weight: 600;
      display: block;
      font-size: 0.9rem;
    }

    .allergen-header .terms-hint {
      font-size: 0.74rem;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
      margin-top: 2px;
    }

    .expand-btn {
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      font-size: 0.8rem;
      padding: 0.2rem 0.3rem;
      flex-shrink: 0;
      transition: transform 0.15s;
      line-height: 1;
    }

    .allergen-item.expanded .expand-btn {
      transform: rotate(90deg);
    }

    .remove-group-btn {
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 0.1rem 0.2rem;
      line-height: 1;
      flex-shrink: 0;
    }

    .remove-group-btn:hover { color: #e74c3c; }

    .allergen-body {
      display: none;
      border-top: 1px solid rgba(255,255,255,0.07);
      padding: 0.75rem 0.75rem 0.8rem;
    }

    .allergen-item.expanded .allergen-body {
      display: block;
    }

    .terms-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .term-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 5px;
      padding: 4px 8px 4px 6px;
      font-size: 0.82rem;
      cursor: default;
    }

    .term-chip.term-disabled {
      opacity: 0.45;
      text-decoration: line-through;
    }

    .term-chip input[type="checkbox"] {
      accent-color: #e74c3c;
      width: 12px;
      height: 12px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .term-chip .term-remove {
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 0.8rem;
      padding: 0 2px;
      line-height: 1;
      margin-left: 2px;
    }

    .term-chip .term-remove:hover { color: #e74c3c; }

    .add-term-row {
      display: flex;
      gap: 0.4rem;
      margin-top: 0.65rem;
    }

    .add-term-row input {
      flex: 1;
      padding: 0.4rem 0.5rem;
      border-radius: 6px;
      border: 1px solid #333;
      background: var(--surface);
      color: var(--text);
      font-size: 0.82rem;
      font-family: inherit;
    }

    .add-term-row button {
      padding: 0.4rem 0.65rem;
      border: none;
      border-radius: 6px;
      background: #3a3a4a;
      color: #ccc;
      font-size: 0.82rem;
      cursor: pointer;
    }

    .add-term-row button:hover { background: #4a4a5a; }

    .add-allergen-row {
      display: flex;
      gap: 0.4rem;
      margin-top: 0.65rem;
    }

    .add-allergen-row input {
      flex: 1;
      padding: 0.5rem 0.6rem;
      border-radius: 6px;
      border: 1px solid #444;
      background: var(--bg);
      color: var(--text);
      font-size: 0.87rem;
      font-family: inherit;
    }

    .add-allergen-row button {
      padding: 0.5rem 0.85rem;
      border: none;
      border-radius: 6px;
      background: #e74c3c;
      color: #fff;
      font-weight: 600;
      font-size: 0.87rem;
      cursor: pointer;
    }

    .allergen-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.6rem;
      margin-bottom: 0.2rem;
    }

    .allergen-count {
      font-size: 0.82rem;
      color: #888;
    }

    .toggle-all-btn {
      padding: 0.35rem 0.7rem;
      border: 1px solid #444;
      border-radius: 5px;
      background: transparent;
      color: var(--text);
      font-size: 0.82rem;
      cursor: pointer;
    }

    .toggle-all-btn:hover {
      border-color: #888;
    }

    /* Scan bar overlay */
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      display: flex;
      align-items: flex-start;
      justify-content: stretch;
      z-index: 5;
    }

    .loading-overlay.hidden {
      display: none;
    }

    .scan-bar {
      position: absolute;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.9) 40%, #fff 50%, rgba(255, 255, 255, 0.9) 60%, transparent 100%);
      box-shadow: 0 0 12px 4px rgba(255, 255, 255, 0.6);
      animation: scan-bounce 1.6s ease-in-out infinite;
      border-radius: 2px;
    }

    @keyframes scan-bounce {
      0% {
        top: 8%;
      }

      50% {
        top: 88%;
      }

      100% {
        top: 8%;
      }
    }

    footer {
      padding: 0.75rem;
      text-align: center;
      font-size: 0.75rem;
      color: #666;
    }

    /* Allergen highlights in OCR text */
    .ocr-text mark.ah {
      background: rgba(231, 76, 60, 0.22);
      color: #f0a098;
      border-radius: 3px;
      padding: 0 2px;
      cursor: help;
      position: relative;
      font-style: normal;
    }

    .ocr-text mark.ah::after {
      content: attr(data-cat);
      position: absolute;
      bottom: calc(100% + 5px);
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a2e;
      color: #e74c3c;
      border: 1px solid rgba(231,76,60,0.6);
      border-radius: 4px;
      padding: 2px 7px;
      font-size: 0.72rem;
      font-weight: 600;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.12s;
      z-index: 20;
    }

    .ocr-text mark.ah:hover::after {
      opacity: 1;
    }
  </style>
</head>

<body>

  <header>
    <h1>Allergen Detector</h1>
  </header>

  <main>
    <div class="camera-wrap" id="cameraWrap">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="snapshot"></canvas>
      <div class="loading-overlay hidden" id="loader">
        <div class="scan-bar"></div>
      </div>
      <div class="drag-hint">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 16V4m0 0L8 8m4-4 4 4"/>
          <path d="M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/>
        </svg>
        Drop image to scan
      </div>
    </div>

    <div class="controls">
      <button id="btnScan" disabled>Scan Camera</button>
      <button id="btnUpload">Upload Image</button>
      <button id="btnRescan" class="hidden">Rescan</button>
      <button id="btnReset">Reset</button>
      <input type="file" id="fileInput" accept="image/*">
    </div>

    <div class="status" id="status">Starting camera&hellip; You can also upload an image.</div>

    <div class="results" id="results"></div>

    <div class="ocr-text" id="ocrText"></div>

    <div class="step-log" id="stepLog"></div>

    <details>
      <summary>Allergens to detect</summary>
      <div class="allergen-toolbar">
        <span class="allergen-count" id="allergenCount"></span>
        <button class="toggle-all-btn" id="btnToggleAll">Disable all</button>
      </div>
      <div class="allergen-grid" id="allergenGrid"></div>
      <div class="add-allergen-row">
        <input type="text" id="newAllergenInput" placeholder="New category name…">
        <button id="btnAddAllergen">Add category</button>
      </div>
    </details>

    <details>
      <summary>API settings</summary>
      <label class="setting-label">Model</label>
      <select id="modelSelect">
        <option value="">Loading models…</option>
      </select>
      <label class="setting-label">API key</label>
      <input type="password" id="apiKeyInput" placeholder="OpenRouter API key (sk-or-v1-…)">
      <div class="key-status" id="keyStatus">No API key saved.</div>
    </details>
  </main>

  <footer>Uses AI vision via OpenRouter for OCR. Image is sent to the API for processing.</footer>

  <script type="module">

    const video = document.getElementById('video');
    const canvas = document.getElementById('snapshot');
    const ctx = canvas.getContext('2d');
    const cameraWrap = document.getElementById('cameraWrap');
    const btnScan = document.getElementById('btnScan');
    const btnUpload = document.getElementById('btnUpload');
    const fileInput = document.getElementById('fileInput');
    const btnRescan = document.getElementById('btnRescan');
    const btnReset = document.getElementById('btnReset');
    const statusEl = document.getElementById('status');
    const resultsEl = document.getElementById('results');
    const ocrTextEl = document.getElementById('ocrText');
    const loader = document.getElementById('loader');
    const apiKeyInput = document.getElementById('apiKeyInput');
    const keyStatus = document.getElementById('keyStatus');
    const modelSelect = document.getElementById('modelSelect');
    const allergenGrid = document.getElementById('allergenGrid');
    const allergenCount = document.getElementById('allergenCount');
    const newAllergenInput = document.getElementById('newAllergenInput');
    const btnAddAllergen = document.getElementById('btnAddAllergen');
    const btnToggleAll = document.getElementById('btnToggleAll');

    let stream = null;

    // ── Settings management (localStorage) ──
    const STORAGE_KEY = 'openrouter_api_key';
    const MODEL_STORAGE_KEY = 'openrouter_model';

    function loadSettings() {
      apiKeyInput.value = localStorage.getItem(STORAGE_KEY) || '';
      updateKeyStatus();
      fetchModels();
    }

    modelSelect.addEventListener('change', () => {
      localStorage.setItem(MODEL_STORAGE_KEY, modelSelect.value);
    });

    const MODELS_CACHE_KEY = 'openrouter_models_cache';

    function renderModelSelect(groups) {
      const saved = localStorage.getItem(MODEL_STORAGE_KEY);
      modelSelect.innerHTML = '';

      const smartOpt = document.createElement('option');
      smartOpt.value = '__smart__';
      smartOpt.textContent = 'Smart routing (free → cheap → mid)';
      modelSelect.appendChild(smartOpt);

      const addGroup = (label, items) => {
        if (!items || items.length === 0) return;
        const group = document.createElement('optgroup');
        group.label = label;
        for (const item of items) {
          const opt = document.createElement('option');
          opt.value = item.id;
          const price = item.pricePerM === 0
            ? 'free'
            : `$${item.pricePerM < 0.01 ? item.pricePerM.toFixed(4) : item.pricePerM.toFixed(2)}/M`;
          opt.textContent = `${item.name} (${price})`;
          group.appendChild(opt);
        }
        modelSelect.appendChild(group);
      };

      addGroup('Free', groups.free);
      addGroup('Low cost (<$1/M input)', groups.low);
      addGroup('Mid range ($1–5/M input)', groups.mid);
      addGroup('Premium (>$5/M input)', groups.high);

      // Restore saved selection
      if (saved && [...modelSelect.options].some(o => o.value === saved)) {
        modelSelect.value = saved;
      }
    }

    // ── Fetch vision models from OpenRouter ──
    async function fetchModels() {
      // 1. Optimistically render from cache immediately
      const cached = localStorage.getItem(MODELS_CACHE_KEY);
      if (cached) {
        try { renderModelSelect(JSON.parse(cached)); } catch {}
      }

      // 2. Fetch fresh data in background
      const apiKey = apiKeyInput.value.trim();
      const headers = apiKey ? { Authorization: `Bearer ${apiKey}` } : {};

      try {
        const res = await fetch('https://openrouter.ai/api/v1/models?output_modalities=text', { headers });
        if (!res.ok) throw new Error(`${res.status}`);
        const { data } = await res.json();

        data.sort((a, b) => {
          const pa = parseFloat(a.pricing?.prompt || '999');
          const pb = parseFloat(b.pricing?.prompt || '999');
          return pa - pb;
        });

        const groups = { free: [], low: [], mid: [], high: [] };

        for (const m of data) {
          const pricePerM = parseFloat(m.pricing?.prompt || '0') * 1_000_000;
          const entry = { id: m.id, name: m.name || m.id, pricePerM };
          if (pricePerM === 0) groups.free.push(entry);
          else if (pricePerM < 1) groups.low.push(entry);
          else if (pricePerM <= 5) groups.mid.push(entry);
          else groups.high.push(entry);
        }

        // Save to cache then re-render (preserves current selection)
        localStorage.setItem(MODELS_CACHE_KEY, JSON.stringify(groups));
        renderModelSelect(groups);

      } catch (err) {
        // If we already rendered from cache, leave it — otherwise show small hardcoded fallback
        if (!cached) {
          const fallbackGroups = {
            free: [
              { id: 'qwen/qwen2.5-vl-32b-instruct:free', name: 'Qwen 2.5 VL 32B', pricePerM: 0 },
              { id: 'meta-llama/llama-4-scout:free',      name: 'Llama 4 Scout',    pricePerM: 0 },
            ],
            low: [
              { id: 'qwen/qwen3-vl-8b-instruct',        name: 'Qwen 3 VL 8B',          pricePerM: 0.08 },
              { id: 'google/gemini-2.5-flash-image',     name: 'Gemini 2.5 Flash Image', pricePerM: 0.10 },
            ],
            mid: [
              { id: 'qwen/qwen2.5-vl-72b-instruct',          name: 'Qwen 2.5 VL 72B', pricePerM: 0.40 },
              { id: 'google/gemini-2.5-pro-preview-03-25',    name: 'Gemini 2.5 Pro',   pricePerM: 1.25 },
            ],
            high: [],
          };
          renderModelSelect(fallbackGroups);
        }
      }
    }

    function updateKeyStatus() {
      const key = apiKeyInput.value.trim();
      if (key) {
        keyStatus.textContent = 'API key saved.';
        keyStatus.classList.add('ok');
      } else {
        keyStatus.textContent = 'No API key saved. Enter your OpenRouter key above.';
        keyStatus.classList.remove('ok');

    // ── Allergen groups (hierarchical, terms as {term, enabled} objects) ──

    const ALLERGEN_STORAGE_KEY = 'allergen_groups_v3';

    // State: array of { id, label, terms:[{term,enabled}], enabled, custom, _expanded }
    let allergens = [];

    function migrateTerms(terms) {
      // Convert string[] -> {term,enabled}[] if needed (migration from v2)
      if (!Array.isArray(terms) || terms.length === 0) return [];
      return typeof terms[0] === 'string' ? terms.map(t => T(t)) : terms;
    }

    function loadAllergens() {
      const saved = localStorage.getItem(ALLERGEN_STORAGE_KEY);
      if (saved) {
        try {
          allergens = JSON.parse(saved);
          allergens.forEach(a => { a.terms = migrateTerms(a.terms); });
          // Merge any new default groups
          for (const def of DEFAULT_ALLERGEN_GROUPS) {
            if (!allergens.some(a => a.id === def.id)) {
              allergens.push({ ...def, enabled: true, custom: false });
            }
          }
        } catch { allergens = []; }
      }
      if (allergens.length === 0) {
        allergens = DEFAULT_ALLERGEN_GROUPS.map(g => ({ ...g, enabled: true, custom: false }));
      }
      renderAllergens();
    }

    function saveAllergens() {
      // Strip transient UI state before persisting
      const toSave = allergens.map(({ _expanded, ...rest }) => rest);
      localStorage.setItem(ALLERGEN_STORAGE_KEY, JSON.stringify(toSave));
      updateAllergenCount();

        chip.classList.toggle('term-disabled', !cb.checked);
        hint.textContent = group.terms.filter(t => t.enabled).map(t => t.term).join(', ') || '(all disabled)';
        saveAllergens();

      const span = document.createElement('span');
      span.textContent = termObj.term;

      const removeBtn = document.createElement('button');
      removeBtn.className = 'term-remove';
      removeBtn.textContent = '\u00d7';
      removeBtn.title = 'Remove term';
      removeBtn.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        const idx = group.terms.indexOf(termObj);
        if (idx !== -1) group.terms.splice(idx, 1);
        chip.remove();
        hint.textContent = group.terms.filter(t => t.enabled).map(t => t.term).join(', ') || '(no terms)';
        saveAllergens();
      });

      chip.appendChild(cb);
      chip.appendChild(span);
      chip.appendChild(removeBtn);
      return chip;

        return;
      }

    // ── Allergen matching ──
    function findAllergensDetailed(text) {
      const lower = text.toLowerCase();
      const allMatches = [];
      for (const group of allergens) {
        if (!group.enabled) continue;
        for (const termObj of group.terms) {
          if (!termObj.enabled) continue;  // respect per-term toggle
          const escaped = termObj.term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          const re = new RegExp(`\\b${escaped}\\b`, 'g');
          let m;
          while ((m = re.exec(lower)) !== null) {
            allMatches.push({ start: m.index, end: m.index + m[0].length, term: termObj.term, groupLabel: group.label });
          }
        }
      }
      // Sort by position, prefer longer match on tie
      allMatches.sort((a, b) => a.start - b.start || (b.end - b.start) - (a.end - a.start));
      // Remove overlaps (greedy, earlier/longer wins)
      const matches = [];
      let lastEnd = 0;
      for (const m of allMatches) {
        if (m.start >= lastEnd) { matches.push(m); lastEnd = m.end; }
      }
      // Aggregate by group
      const groupMap = new Map();
      for (const m of matches) {
        if (!groupMap.has(m.groupLabel)) groupMap.set(m.groupLabel, new Set());
        groupMap.get(m.groupLabel).add(m.term);
      }
      const groups = [...groupMap.entries()].map(([label, terms]) => ({ label, matchedTerms: [...terms] }));
      return { groups, matches };
    }

    // Thin wrapper returning just labels (used where full detail isn't needed)
    function findAllergens(text) {
      return findAllergensDetailed(text).groups.map(g => g.label);
    }

    // Build HTML with matched terms wrapped in highlighted <mark> elements
    function escHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function buildHighlightedHTML(text, matches) {
      let html = '';
      let pos = 0;
      for (const m of matches) {
        html += escHtml(text.slice(pos, m.start));
        html += `<mark class="ah" data-cat="${escHtml(m.groupLabel)}">${escHtml(text.slice(m.start, m.end))}</mark>`;
        pos = m.end;
      }
      html += escHtml(text.slice(pos));
      return html;
    }

    // Build result tag HTML with title listing matched words
    function buildTagsHTML(groups) {
      return groups.map(g => {
        const tip = g.matchedTerms.join(', ');
        return `<span class="tag found" title="matched: ${escHtml(tip)}">${escHtml(g.label)}</span>`;
      }).join('');
    }

    async function startCamera() {

          audio: false
        });
        video.srcObject = stream;
        await video.play();

    function captureFrame() {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      cameraWrap.classList.add('frozen');
    }

    // ── Load uploaded image onto canvas ──
    function loadImageToCanvas(file) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
          canvas.width = img.naturalWidth;
          canvas.height = img.naturalHeight;
          ctx.drawImage(img, 0, 0);
          cameraWrap.classList.add('frozen');
          URL.revokeObjectURL(img.src);
          resolve();
        };
        img.onerror = () => reject(new Error('Failed to load image'));
        img.src = URL.createObjectURL(file);
      });
    }

    // ── AI Vision OCR via OpenRouter ──
    let cachedBase64 = null;
    const MAX_DIM = 1024; // px — enough for text OCR, keeps tile counts low

    function preprocessImage() {
      if (cachedBase64) return cachedBase64;

      const src = { w: canvas.width, h: canvas.height };

      // 1. Scale down if either dimension exceeds MAX_DIM
      const scale = Math.min(1, MAX_DIM / Math.max(src.w, src.h));
      const w = Math.round(src.w * scale);
      const h = Math.round(src.h * scale);

      const offscreen = document.createElement('canvas');
      offscreen.width  = w;
      offscreen.height = h;
      const octx = offscreen.getContext('2d');

      // 2. Draw scaled image
      octx.drawImage(canvas, 0, 0, w, h);

      // 3. Convert to grayscale in-place (luminance-weighted)
      const id = octx.getImageData(0, 0, w, h);
      const d  = id.data;
      for (let i = 0; i < d.length; i += 4) {
        const lum = d[i] * 0.299 + d[i+1] * 0.587 + d[i+2] * 0.114;
        d[i] = d[i+1] = d[i+2] = lum;
      }
      octx.putImageData(id, 0, 0);

      // 4. Encode at moderate JPEG quality
      cachedBase64 = offscreen.toDataURL('image/jpeg', 0.75);
      return cachedBase64;
    }

    async function recognizeText(modelId, onChunk) {
      const apiKey = apiKeyInput.value.trim();
      if (!apiKey) {
        throw new Error('No API key. Open "API settings" below and paste your OpenRouter key.');
      }

      const base64 = preprocessImage();
      const maxAttempts = isFreeModel(modelId) ? 2 : 1;

      for (let attempt = 0; attempt < maxAttempts; attempt++) {
        if (attempt > 0) {
          statusEl.textContent = 'Rate limited — retrying free tier…';
          await new Promise(r => setTimeout(r, 5000));
        }

        const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${apiKey}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            model: modelId,
            messages: [
              {
                role: 'user',
                content: [
                  {
                    type: 'text',
                    text: 'Extract ALL text from this image exactly as written. This is a food ingredient label. Output ONLY the raw text, nothing else — no commentary, no formatting, no markdown. Preserve line breaks where they appear.'
                  },
                  {
                    type: 'image_url',
                    image_url: { url: base64 }
                  }
                ]
              }
            ],
            max_tokens: 1024,
            temperature: 0,
            stream: true
          })
        });

        if (!response.ok) {
          if (response.status === 429 && attempt < maxAttempts - 1) continue; // retry
          const err = await response.json().catch(() => ({}));
          throw new Error(err.error?.message || `API error ${response.status}`);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let text = '';
        let generationId = null;
        let finalModel = modelId;
        let buf = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });

          const lines = buf.split('\n');
          buf = lines.pop(); // keep potential incomplete last line in buffer
          for (const line of lines) {
            const trimmed = line.trim();
            if (trimmed.startsWith('data: ') && trimmed !== 'data: [DONE]') {
              try {
                const data = JSON.parse(trimmed.slice(6));
                if (!generationId && data.id) generationId = data.id;
                if (data.model) finalModel = data.model;
                const delta = data.choices?.[0]?.delta?.content;
                if (delta) {
                  text += delta;
                  if (onChunk) onChunk(text);
                }
              } catch (e) { }
            }
          }
        }

        const cost = null; // cost fetched separately after stream
        return { text, usage: {}, generationId, cost, model: finalModel };
      }

      throw new Error('Max retries exceeded');
    }

    function isFreeModel(modelId) {
      return modelId === 'openrouter/free' || modelId.endsWith(':free');
    }

    // ── Fetch generation cost in background ──
    async function fetchCost(generationId, apiKey, onCost) {
      const delays = [2000, 4000, 6000, 8000, 10000, 15000, 20000, 30000];
      for (let attempt = 0; attempt < delays.length; attempt++) {
        await new Promise(r => setTimeout(r, delays[attempt]));
        try {
          const genRes = await fetch(`https://openrouter.ai/api/v1/generation?id=${generationId}`, {
            headers: { 'Authorization': `Bearer ${apiKey}` }
          });
          if (genRes.ok) {
            const genData = await genRes.json();
            const c = genData?.data?.total_cost ?? null;
            if (c !== null && c > 0) { onCost(c); return; }
          }
        } catch (e) { }
      }
    }

    function updateStepEntry(entry, { elapsed, cost, found, text, matches, error, actualModel }) {
      entry.classList.remove('running');
      if (actualModel) {
        entry.querySelector('.step-model-name').textContent = actualModel;
      }

      const meta = entry.querySelector('.step-meta');

      if (cost !== null && cost !== undefined && cost > 0) {
        parts.push(`$${cost < 0.001 ? cost.toFixed(6) : cost.toFixed(4)}`);
      }
      meta.innerHTML = parts.map(p => `<span>${p}</span>`).join('');

      if (error) {

        const errEl = document.createElement('div');

        entry.appendChild(errEl);
        return;
      }

      if (found.length > 0) {
        entry.classList.add('found');
        const allergenDiv = document.createElement('div');
        allergenDiv.className = 'step-allergens';
        allergenDiv.innerHTML = found.map(a => `<span class="tag found">${a}</span>`).join('');
        entry.appendChild(allergenDiv);

        entry.classList.add('clear');

        allergenDiv.className = 'step-allergens';
        allergenDiv.innerHTML = '<span class="tag clear">No allergens</span>';
        entry.appendChild(allergenDiv);
      }

      // Add toggle to show/hide OCR text (with highlights)
      const toggleBtn = document.createElement('button');
      toggleBtn.className = 'step-toggle';
      toggleBtn.textContent = 'Show recognized text';
      const textDiv = document.createElement('div');
      textDiv.className = 'step-text ocr-text';

      toggleBtn.addEventListener('click', () => {
        const open = textDiv.classList.toggle('visible');
        toggleBtn.textContent = open ? 'Hide recognized text' : 'Show recognized text';
      });
      entry.appendChild(toggleBtn);
      entry.appendChild(textDiv);

    // ── Single model OCR ──
    async function runOCR() {
      const isSmartRoute = modelSelect.value === '__smart__';
      if (isSmartRoute) return runSmartOCR();

      loader.classList.remove('hidden');
      cameraWrap.classList.remove('safe', 'danger');
      resultsEl.classList.remove('visible');
      ocrTextEl.classList.remove('visible');
      clearStepLog();
      statusEl.textContent = 'Sending image to AI for text recognition…';
      btnScan.disabled = true;
      btnRescan.classList.add('hidden');
      cachedBase64 = null;

      const t0 = performance.now();

      try {
        const { text, generationId, model: finalModel } = await recognizeText(modelSelect.value, (partialText) => {
          const { groups, matches } = findAllergensDetailed(partialText);
          ocrTextEl.innerHTML = buildHighlightedHTML(partialText, matches);
          ocrTextEl.classList.add('visible');

          if (groups.length > 0) {
            cameraWrap.classList.remove('safe');
            cameraWrap.classList.add('danger');
            const elapsed = ((performance.now() - t0) / 1000).toFixed(1);
            statusEl.textContent = `Allergens detected! (${elapsed}s…)`;
            resultsEl.innerHTML = `<h3>Allergens found:</h3>` + buildTagsHTML(groups);
            resultsEl.classList.add('visible');
          }
        });

        loader.classList.add('hidden');
        btnScan.disabled = !stream;
        btnRescan.classList.remove('hidden');

        const elapsed = ((performance.now() - t0) / 1000).toFixed(1);
        const { groups, matches } = findAllergensDetailed(text);
        ocrTextEl.innerHTML = buildHighlightedHTML(text, matches);
        ocrTextEl.classList.add('visible');

        if (groups.length > 0) {
          cameraWrap.classList.add('danger');
          statusEl.textContent = `Allergens detected (${groups.length})! (${elapsed}s)`;
          resultsEl.innerHTML = `<h3>Allergens found:</h3>` + buildTagsHTML(groups);
        } else {
          cameraWrap.classList.add('safe');
          statusEl.textContent = `No allergens detected. (${elapsed}s)`;
          resultsEl.innerHTML = `<h3>Result:</h3><span class="tag clear">No allergens found</span>`;
        }
        resultsEl.classList.add('visible');

        // Fetch cost in background — skip for free models
        if (generationId && !isFreeModel(finalModel)) {
          const apiKey = apiKeyInput.value.trim();
          fetchCost(generationId, apiKey, (cost) => {
            const costStr = ` · $${cost < 0.001 ? cost.toFixed(6) : cost.toFixed(4)}`;
            const base = groups.length > 0
              ? `Allergens detected (${groups.length})! (${elapsed}s${costStr})`
              : `No allergens detected. (${elapsed}s${costStr})`;
            statusEl.textContent = base;
          });
        }
      } catch (err) {
        const elapsed = ((performance.now() - t0) / 1000).toFixed(1);
        statusEl.textContent = `Error: ${err.message} (${elapsed}s)`;
        loader.classList.add('hidden');
        btnScan.disabled = !stream;
        btnRescan.classList.remove('hidden');
      }
    }

    // ── Smart routing OCR ──
    async function runSmartOCR() {
      loader.classList.remove('hidden');
      cameraWrap.classList.remove('safe', 'danger');
      resultsEl.classList.remove('visible');
      ocrTextEl.classList.remove('visible');
      clearStepLog();
      statusEl.textContent = 'Smart scan: escalating through model tiers…';
      btnScan.disabled = true;
      btnRescan.classList.add('hidden');
      cachedBase64 = null;

      const tiers = SMART_ROUTE_TIERS;
      let allergenResult = null;
      let totalCost = 0;
      const t0Global = performance.now();

      for (const tier of tiers) {
        const entry = addStepEntry(tier.model, tier.label);
        const t0 = performance.now();
        try {
          statusEl.textContent = `Smart scan: trying ${tier.label} tier (${tier.model})…`;
          const { text, generationId, model: actualModel } = await recognizeText(tier.model, (partialText) => {
            const { groups, matches } = findAllergensDetailed(partialText);
            if (groups.length > 0) {
              cameraWrap.classList.remove('safe');
              cameraWrap.classList.add('danger');
              const partialElapsed = ((performance.now() - t0) / 1000).toFixed(1);
              statusEl.textContent = `Allergens found via stream! (${partialElapsed}s…)`;
              resultsEl.innerHTML = `<h3>Allergens found:</h3>` + buildTagsHTML(groups);
              resultsEl.classList.add('visible');
            }
          });
          const elapsed = ((performance.now() - t0) / 1000).toFixed(1);

          const { groups: foundGroups, matches: foundMatches } = findAllergensDetailed(text);
          const foundLabels = foundGroups.map(g => g.label);
          updateStepEntry(entry, { elapsed, cost: null, found: foundLabels, text, matches: foundMatches, actualModel });

          // Fetch cost for this step in background — skip for free models
          if (generationId && !isFreeModel(actualModel)) {
            const apiKey = apiKeyInput.value.trim();
            fetchCost(generationId, apiKey, (cost) => {
              totalCost += cost;
              const meta = entry.querySelector('.step-meta');
              if (meta) {
                const costStr = `$${cost < 0.001 ? cost.toFixed(6) : cost.toFixed(4)}`;
                meta.innerHTML = `<span>${elapsed}s</span><span>${costStr}</span>`;
              }
            });
          }

          if (foundGroups.length > 0) {
            allergenResult = { found: foundLabels, groups: foundGroups, text, tier: tier.label, model: actualModel || tier.model };
            break;
          }
        } catch (err) {
          const elapsed = ((performance.now() - t0) / 1000).toFixed(1);
          updateStepEntry(entry, { elapsed, cost: null, found: [], text: '', error: err.message });
        }
      }

      loader.classList.add('hidden');
      btnScan.disabled = !stream;
      btnRescan.classList.remove('hidden');

      const totalElapsed = ((performance.now() - t0Global) / 1000).toFixed(1);

      if (allergenResult) {
        cameraWrap.classList.add('danger');
        statusEl.textContent = `Allergens found by ${allergenResult.tier} tier! (${totalElapsed}s)`;
        resultsEl.innerHTML = `<h3>Allergens found (${allergenResult.model}):</h3>` + buildTagsHTML(allergenResult.groups);
      } else {
        cameraWrap.classList.add('safe');
        statusEl.textContent = `No allergens detected across all tiers. (${totalElapsed}s)`;
        resultsEl.innerHTML = `<h3>Result:</h3><span class="tag clear">No allergens found (checked ${tiers.length} models)</span>`;
      }
      resultsEl.classList.add('visible');
    }

    async function scanCamera() {
      captureFrame();
      await runOCR();
    }

    async function scanUpload(file) {
      try {
        await loadImageToCanvas(file);
        await runOCR();
      } catch (err) {
        statusEl.textContent = `Upload error: ${err.message}`;
      }
    }

    function reset() {
      cameraWrap.classList.remove('frozen', 'safe', 'danger');
      resultsEl.classList.remove('visible');
      ocrTextEl.classList.remove('visible');
      clearStepLog();
      btnRescan.classList.add('hidden');
      cachedBase64 = null;
      fileInput.value = '';
      statusEl.textContent = stream
        ? 'Camera ready. Point at an ingredient list and tap "Scan Camera", or upload an image.'
        : 'Upload an image to scan for allergens.';
    }

    // ── Events ──
    btnScan.addEventListener('click', scanCamera);
    btnUpload.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => {
      if (fileInput.files.length > 0) scanUpload(fileInput.files[0]);
    });
    btnRescan.addEventListener('click', runOCR);
    btnReset.addEventListener('click', reset);

    // ── Drag-and-drop on camera wrap ──
    cameraWrap.addEventListener('dragenter', (e) => {
      e.preventDefault();
      if (e.dataTransfer.types.includes('Files')) cameraWrap.classList.add('drag-over');
    });
    cameraWrap.addEventListener('dragover', (e) => {
      e.preventDefault();
    });
    cameraWrap.addEventListener('dragleave', (e) => {
      // Only clear if leaving the wrap itself, not a child element
      if (!cameraWrap.contains(e.relatedTarget)) cameraWrap.classList.remove('drag-over');
    });
    cameraWrap.addEventListener('drop', (e) => {
      e.preventDefault();
      cameraWrap.classList.remove('drag-over');
      const file = [...e.dataTransfer.files].find(f => f.type.startsWith('image/'));
      if (file) scanUpload(file);
    });

    // ── Init ──
    loadAllergens();
    loadSettings();
    startCamera();
  </script>
</body>

</html>
