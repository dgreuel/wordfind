<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Allergen Detector</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --border-color: #444;
    --bg: #1a1a2e;
    --surface: #16213e;
    --text: #e0e0e0;
    --accent: #0f3460;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    padding: 1rem;
    text-align: center;
    background: var(--surface);
    border-bottom: 1px solid #333;
  }
  header h1 { font-size: 1.4rem; font-weight: 600; }

  main {
    width: 100%;
    max-width: 640px;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    flex: 1;
  }

  /* Camera viewport */
  .camera-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 4/3;
    border: 4px solid var(--border-color);
    border-radius: 12px;
    overflow: hidden;
    background: #000;
    transition: border-color 0.3s ease;
  }
  .camera-wrap.safe  { border-color: #2ecc71; box-shadow: 0 0 20px rgba(46,204,113,0.3); }
  .camera-wrap.danger { border-color: #e74c3c; box-shadow: 0 0 20px rgba(231,76,60,0.4); }

  video, .camera-wrap canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .camera-wrap canvas { display: none; }
  .camera-wrap.frozen video { display: none; }
  .camera-wrap.frozen canvas { display: block; }

  /* Controls */
  .controls {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .controls button {
    flex: 1;
    min-width: 120px;
    padding: 0.75rem 1rem;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .controls button:disabled { opacity: 0.4; cursor: not-allowed; }

  #btnScan { background: #e74c3c; color: #fff; }
  #btnUpload { background: var(--accent); color: #fff; }
  #btnRescan { background: #e67e22; color: #fff; }
  #btnReset { background: #555; color: #fff; }
  #fileInput { display: none; }
  .controls .hidden { display: none; }

  /* Status */
  .status {
    padding: 0.75rem 1rem;
    border-radius: 8px;
    background: var(--surface);
    font-size: 0.95rem;
    line-height: 1.5;
    min-height: 3rem;
  }

  /* Results */
  .results {
    padding: 0.75rem 1rem;
    border-radius: 8px;
    background: var(--surface);
    display: none;
  }
  .results.visible { display: block; }
  .results h3 { margin-bottom: 0.5rem; font-size: 1rem; }
  .results .tag {
    display: inline-block;
    padding: 0.25rem 0.6rem;
    margin: 0.2rem;
    border-radius: 4px;
    font-size: 0.85rem;
    font-weight: 600;
  }
  .tag.found { background: rgba(231,76,60,0.2); color: #e74c3c; border: 1px solid #e74c3c; }
  .tag.clear { background: rgba(46,204,113,0.15); color: #2ecc71; border: 1px solid #2ecc71; }

  /* Recognized text preview */
  .ocr-text {
    padding: 0.75rem 1rem;
    border-radius: 8px;
    background: var(--surface);
    font-size: 0.8rem;
    line-height: 1.4;
    max-height: 8rem;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-word;
    display: none;
  }
  .ocr-text.visible { display: block; }

  /* Smart routing step log */
  .step-log {
    display: none;
    flex-direction: column;
    gap: 0.5rem;
  }
  .step-log.visible { display: flex; }
  .step-entry {
    padding: 0.6rem 0.75rem;
    border-radius: 8px;
    background: var(--surface);
    border-left: 3px solid #444;
    font-size: 0.85rem;
  }
  .step-entry.running { border-left-color: #e67e22; }
  .step-entry.found   { border-left-color: #e74c3c; }
  .step-entry.clear   { border-left-color: #2ecc71; }
  .step-entry.error   { border-left-color: #888; }
  .step-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .step-model { font-weight: 600; }
  .step-meta {
    font-size: 0.75rem;
    color: #888;
    display: flex;
    gap: 0.6rem;
  }
  .step-allergens {
    margin-top: 0.3rem;
  }
  .step-toggle {
    margin-top: 0.35rem;
    font-size: 0.75rem;
    color: #5dade2;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    text-align: left;
  }
  .step-toggle:hover { text-decoration: underline; }
  .step-text {
    margin-top: 0.3rem;
    font-size: 0.78rem;
    line-height: 1.35;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 6rem;
    overflow-y: auto;
    color: #aaa;
    display: none;
  }
  .step-text.visible { display: block; }

  /* Settings panels */
  details {
    background: var(--surface);
    border-radius: 8px;
    padding: 0.75rem 1rem;
  }
  details summary {
    cursor: pointer;
    font-weight: 600;
    font-size: 0.95rem;
  }
  .setting-label {
    display: block;
    margin-top: 0.6rem;
    font-size: 0.8rem;
    color: #888;
  }
  details select {
    margin-top: 0.3rem;
    width: 100%;
    padding: 0.5rem;
    border-radius: 6px;
    border: 1px solid #444;
    background: var(--bg);
    color: var(--text);
    font-family: inherit;
    font-size: 0.85rem;
    cursor: pointer;
  }
  details input[type="password"], details input[type="text"] {
    margin-top: 0.3rem;
    width: 100%;
    padding: 0.5rem;
    border-radius: 6px;
    border: 1px solid #444;
    background: var(--bg);
    color: var(--text);
    font-family: inherit;
    font-size: 0.85rem;
  }
  .key-status {
    margin-top: 0.4rem;
    font-size: 0.8rem;
    color: #888;
  }
  .key-status.ok { color: #2ecc71; }

  /* Allergen list */
  .allergen-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 0.35rem;
    margin-top: 0.6rem;
    max-height: 16rem;
    overflow-y: auto;
    padding-right: 0.25rem;
  }
  .allergen-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.3rem 0.5rem;
    border-radius: 6px;
    background: var(--bg);
    font-size: 0.85rem;
    cursor: pointer;
    user-select: none;
    transition: opacity 0.15s;
  }
  .allergen-item:hover { background: rgba(255,255,255,0.05); }
  .allergen-item.disabled { opacity: 0.4; }
  .allergen-item input[type="checkbox"] {
    accent-color: #e74c3c;
    width: 16px;
    height: 16px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .allergen-item .label { flex: 1; }
  .allergen-item .remove-btn {
    background: none;
    border: none;
    color: #666;
    cursor: pointer;
    font-size: 1rem;
    padding: 0 0.2rem;
    line-height: 1;
    display: none;
  }
  .allergen-item.custom .remove-btn { display: inline; }
  .allergen-item .remove-btn:hover { color: #e74c3c; }

  .add-allergen-row {
    display: flex;
    gap: 0.4rem;
    margin-top: 0.5rem;
  }
  .add-allergen-row input {
    flex: 1;
    padding: 0.45rem 0.5rem;
    border-radius: 6px;
    border: 1px solid #444;
    background: var(--bg);
    color: var(--text);
    font-size: 0.85rem;
  }
  .add-allergen-row button {
    padding: 0.45rem 0.75rem;
    border: none;
    border-radius: 6px;
    background: #e74c3c;
    color: #fff;
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
  }
  .allergen-toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 0.5rem;
    margin-bottom: 0.1rem;
  }
  .allergen-count {
    font-size: 0.8rem;
    color: #888;
  }
  .toggle-all-btn {
    padding: 0.3rem 0.6rem;
    border: 1px solid #444;
    border-radius: 5px;
    background: transparent;
    color: var(--text);
    font-size: 0.8rem;
    cursor: pointer;
  }
  .toggle-all-btn:hover { border-color: #888; }

  /* Loading overlay */
  .loading-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 5;
  }
  .loading-overlay.hidden { display: none; }
  .spinner {
    width: 48px; height: 48px;
    border: 4px solid rgba(255,255,255,0.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  footer {
    padding: 0.75rem;
    text-align: center;
    font-size: 0.75rem;
    color: #666;
  }
</style>
</head>
<body>

<header>
  <h1>Allergen Detector</h1>
</header>

<main>
  <div class="camera-wrap" id="cameraWrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="snapshot"></canvas>
    <div class="loading-overlay hidden" id="loader">
      <div class="spinner"></div>
    </div>
  </div>

  <div class="controls">
    <button id="btnScan" disabled>Scan Camera</button>
    <button id="btnUpload">Upload Image</button>
    <button id="btnRescan" class="hidden">Rescan</button>
    <button id="btnReset">Reset</button>
    <input type="file" id="fileInput" accept="image/*">
  </div>

  <div class="status" id="status">Starting camera&hellip; You can also upload an image.</div>

  <div class="results" id="results"></div>

  <div class="ocr-text" id="ocrText"></div>

  <div class="step-log" id="stepLog"></div>

  <details>
    <summary>Allergens to detect</summary>
    <div class="allergen-toolbar">
      <span class="allergen-count" id="allergenCount"></span>
      <button class="toggle-all-btn" id="btnToggleAll">Disable all</button>
    </div>
    <div class="allergen-grid" id="allergenGrid"></div>
    <div class="add-allergen-row">
      <input type="text" id="newAllergenInput" placeholder="Add custom allergen…">
      <button id="btnAddAllergen">Add</button>
    </div>
  </details>

  <details>
    <summary>API settings</summary>
    <label class="setting-label">Model</label>
    <select id="modelSelect">
      <option value="">Loading models…</option>
    </select>
    <label class="setting-label">API key</label>
    <input type="password" id="apiKeyInput" placeholder="OpenRouter API key (sk-or-v1-…)">
    <div class="key-status" id="keyStatus">No API key saved.</div>
  </details>
</main>

<footer>Uses AI vision via OpenRouter for OCR. Image is sent to the API for processing.</footer>

<script type="module">

const video        = document.getElementById('video');
const canvas       = document.getElementById('snapshot');
const ctx          = canvas.getContext('2d');
const cameraWrap   = document.getElementById('cameraWrap');
const btnScan          = document.getElementById('btnScan');
const btnUpload        = document.getElementById('btnUpload');
const fileInput        = document.getElementById('fileInput');
const btnRescan        = document.getElementById('btnRescan');
const btnReset         = document.getElementById('btnReset');
const statusEl         = document.getElementById('status');
const resultsEl        = document.getElementById('results');
const ocrTextEl        = document.getElementById('ocrText');
const loader           = document.getElementById('loader');
const apiKeyInput      = document.getElementById('apiKeyInput');
const keyStatus        = document.getElementById('keyStatus');
const modelSelect      = document.getElementById('modelSelect');
const allergenGrid     = document.getElementById('allergenGrid');
const allergenCount    = document.getElementById('allergenCount');
const newAllergenInput = document.getElementById('newAllergenInput');
const btnAddAllergen   = document.getElementById('btnAddAllergen');
const btnToggleAll     = document.getElementById('btnToggleAll');

let stream = null;

// ── Settings management (localStorage) ──
const STORAGE_KEY = 'openrouter_api_key';
const MODEL_STORAGE_KEY = 'openrouter_model';

function loadSettings() {
  apiKeyInput.value = localStorage.getItem(STORAGE_KEY) || '';
  updateKeyStatus();
  fetchModels();
}

modelSelect.addEventListener('change', () => {
  localStorage.setItem(MODEL_STORAGE_KEY, modelSelect.value);
});

// ── Fetch vision models from OpenRouter ──
async function fetchModels() {
  const apiKey = apiKeyInput.value.trim();
  const headers = apiKey ? { Authorization: `Bearer ${apiKey}` } : {};

  try {
    const res = await fetch('https://openrouter.ai/api/v1/models', { headers });
    if (!res.ok) throw new Error(`${res.status}`);
    const { data } = await res.json();

    // Filter to models that support image input
    const visionModels = data.filter(m =>
      m.architecture?.modality?.includes('image') ||
      m.supported_parameters?.includes('images') ||
      (m.architecture?.input_modalities && m.architecture.input_modalities.includes('image'))
    );

    // Sort by input price
    visionModels.sort((a, b) => {
      const pa = parseFloat(a.pricing?.prompt || '999');
      const pb = parseFloat(b.pricing?.prompt || '999');
      return pa - pb;
    });

    // Group into tiers
    const free = [];
    const low = [];   // < $1/M
    const mid = [];   // $1–5/M
    const high = [];  // > $5/M

    for (const m of visionModels) {
      const pricePerM = parseFloat(m.pricing?.prompt || '0') * 1_000_000;
      const entry = { id: m.id, name: m.name || m.id, pricePerM };
      if (pricePerM === 0) free.push(entry);
      else if (pricePerM < 1) low.push(entry);
      else if (pricePerM <= 5) mid.push(entry);
      else high.push(entry);
    }

    modelSelect.innerHTML = '';

    // Add smart routing option at the top
    const smartOpt = document.createElement('option');
    smartOpt.value = '__smart__';
    smartOpt.textContent = 'Smart routing (free → cheap → mid)';
    modelSelect.appendChild(smartOpt);

    const addGroup = (label, items) => {
      if (items.length === 0) return;
      const group = document.createElement('optgroup');
      group.label = label;
      for (const item of items) {
        const opt = document.createElement('option');
        opt.value = item.id;
        const price = item.pricePerM === 0
          ? 'free'
          : `$${item.pricePerM < 0.01 ? item.pricePerM.toFixed(4) : item.pricePerM.toFixed(2)}/M`;
        opt.textContent = `${item.name} (${price})`;
        group.appendChild(opt);
      }
      modelSelect.appendChild(group);
    };

    addGroup('Free', free);
    addGroup('Low cost (<$1/M input)', low);
    addGroup('Mid range ($1–5/M input)', mid);
    addGroup('Premium (>$5/M input)', high);

    // Restore saved selection
    const saved = localStorage.getItem(MODEL_STORAGE_KEY);
    if (saved && [...modelSelect.options].some(o => o.value === saved)) {
      modelSelect.value = saved;
    }

  } catch (err) {
    // Fallback to a small hardcoded list if API fails
    modelSelect.innerHTML = '';
    const smartFallback = document.createElement('option');
    smartFallback.value = '__smart__';
    smartFallback.textContent = 'Smart routing (free → cheap → mid)';
    modelSelect.appendChild(smartFallback);
    const fallback = [
      ['Free', [
        ['qwen/qwen2.5-vl-32b-instruct:free', 'Qwen 2.5 VL 32B (free)'],
        ['meta-llama/llama-4-scout:free', 'Llama 4 Scout (free)'],
      ]],
      ['Low cost', [
        ['qwen/qwen3-vl-8b-instruct', 'Qwen 3 VL 8B ($0.08/M)'],
        ['google/gemini-2.5-flash-image', 'Gemini 2.5 Flash Image ($0.10/M)'],
      ]],
      ['Best accuracy', [
        ['qwen/qwen2.5-vl-72b-instruct', 'Qwen 2.5 VL 72B ($0.40/M)'],
        ['google/gemini-2.5-pro-preview-03-25', 'Gemini 2.5 Pro ($1.25/M)'],
      ]],
    ];
    for (const [label, models] of fallback) {
      const group = document.createElement('optgroup');
      group.label = label;
      for (const [id, name] of models) {
        const opt = document.createElement('option');
        opt.value = id;
        opt.textContent = name;
        group.appendChild(opt);
      }
      modelSelect.appendChild(group);
    }
    const saved = localStorage.getItem(MODEL_STORAGE_KEY);
    if (saved && [...modelSelect.options].some(o => o.value === saved)) {
      modelSelect.value = saved;
    }
  }
}

function updateKeyStatus() {
  const key = apiKeyInput.value.trim();
  if (key) {
    keyStatus.textContent = 'API key saved.';
    keyStatus.classList.add('ok');
  } else {
    keyStatus.textContent = 'No API key saved. Enter your OpenRouter key above.';
    keyStatus.classList.remove('ok');
  }
}

apiKeyInput.addEventListener('input', () => {
  const key = apiKeyInput.value.trim();
  if (key) {
    localStorage.setItem(STORAGE_KEY, key);
  } else {
    localStorage.removeItem(STORAGE_KEY);
  }
  updateKeyStatus();
});

// ── Allergen list with checkboxes ──
const DEFAULT_ALLERGENS = [
  'milk','egg','eggs','peanut','peanuts','tree nut','tree nuts',
  'almond','almonds','cashew','cashews','walnut','walnuts',
  'pecan','pecans','pistachio','pistachios','hazelnut','hazelnuts',
  'macadamia','wheat','gluten','soy','soybean','soybeans','soya',
  'fish','shellfish','shrimp','crab','lobster','sesame',
  'mustard','celery','lupin','lupine','molluscs','mollusks',
  'sulphite','sulfite','sulphites','sulfites','lactose','casein','whey'
];

const ALLERGEN_STORAGE_KEY = 'allergen_prefs';

// State: array of { name, enabled, custom }
let allergens = [];

function loadAllergens() {
  const saved = localStorage.getItem(ALLERGEN_STORAGE_KEY);
  if (saved) {
    try {
      allergens = JSON.parse(saved);
      // Ensure any new defaults added in future are included
      for (const name of DEFAULT_ALLERGENS) {
        if (!allergens.some(a => a.name === name)) {
          allergens.push({ name, enabled: true, custom: false });
        }
      }
    } catch { allergens = []; }
  }
  if (allergens.length === 0) {
    allergens = DEFAULT_ALLERGENS.map(name => ({ name, enabled: true, custom: false }));
  }
  renderAllergens();
}

function saveAllergens() {
  localStorage.setItem(ALLERGEN_STORAGE_KEY, JSON.stringify(allergens));
  updateAllergenCount();
}

function updateAllergenCount() {
  const active = allergens.filter(a => a.enabled).length;
  allergenCount.textContent = `${active} of ${allergens.length} active`;
  btnToggleAll.textContent = active > 0 ? 'Disable all' : 'Enable all';
}

function renderAllergens() {
  allergenGrid.innerHTML = '';
  for (let i = 0; i < allergens.length; i++) {
    const a = allergens[i];
    const item = document.createElement('label');
    item.className = 'allergen-item' + (a.custom ? ' custom' : '') + (a.enabled ? '' : ' disabled');

    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = a.enabled;
    cb.addEventListener('change', () => {
      a.enabled = cb.checked;
      item.classList.toggle('disabled', !cb.checked);
      saveAllergens();
    });

    const label = document.createElement('span');
    label.className = 'label';
    label.textContent = a.name;

    item.appendChild(cb);
    item.appendChild(label);

    if (a.custom) {
      const removeBtn = document.createElement('button');
      removeBtn.className = 'remove-btn';
      removeBtn.textContent = '\u00d7';
      removeBtn.title = 'Remove';
      removeBtn.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        allergens.splice(i, 1);
        saveAllergens();
        renderAllergens();
      });
      item.appendChild(removeBtn);
    }

    allergenGrid.appendChild(item);
  }
  updateAllergenCount();
}

function addCustomAllergen(name) {
  name = name.trim().toLowerCase();
  if (!name) return;
  if (allergens.some(a => a.name === name)) {
    // If it exists but is disabled, enable it
    const existing = allergens.find(a => a.name === name);
    if (!existing.enabled) {
      existing.enabled = true;
      saveAllergens();
      renderAllergens();
    }
    return;
  }
  allergens.push({ name, enabled: true, custom: true });
  saveAllergens();
  renderAllergens();
}

btnAddAllergen.addEventListener('click', () => {
  addCustomAllergen(newAllergenInput.value);
  newAllergenInput.value = '';
  newAllergenInput.focus();
});
newAllergenInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    addCustomAllergen(newAllergenInput.value);
    newAllergenInput.value = '';
  }
});
btnToggleAll.addEventListener('click', () => {
  const anyEnabled = allergens.some(a => a.enabled);
  for (const a of allergens) a.enabled = !anyEnabled;
  saveAllergens();
  renderAllergens();
});

// ── Allergen matching ──
function getActiveAllergens() {
  return allergens.filter(a => a.enabled).map(a => a.name);
}

function findAllergens(text) {
  const lower = text.toLowerCase();
  const active = getActiveAllergens();
  const found = [];
  for (const a of active) {
    const re = new RegExp(`\\b${a.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}\\b`);
    if (re.test(lower)) found.push(a);
  }
  return [...new Set(found)];
}

// ── Camera ──
async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
    btnScan.disabled = false;
    statusEl.textContent = 'Camera ready. Point at an ingredient list and tap "Scan Camera", or upload an image.';
  } catch (err) {
    statusEl.textContent = 'No camera available. Upload an image to scan for allergens.';
  }
}

function captureFrame() {
  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);
  cameraWrap.classList.add('frozen');
}

// ── Load uploaded image onto canvas ──
function loadImageToCanvas(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      ctx.drawImage(img, 0, 0);
      cameraWrap.classList.add('frozen');
      URL.revokeObjectURL(img.src);
      resolve();
    };
    img.onerror = () => reject(new Error('Failed to load image'));
    img.src = URL.createObjectURL(file);
  });
}

// ── AI Vision OCR via OpenRouter ──
let cachedBase64 = null;

function getBase64Image() {
  if (!cachedBase64) cachedBase64 = canvas.toDataURL('image/jpeg', 0.9);
  return cachedBase64;
}

async function recognizeText(modelId) {
  const apiKey = apiKeyInput.value.trim();
  if (!apiKey) {
    throw new Error('No API key. Open "API settings" below and paste your OpenRouter key.');
  }

  const base64 = getBase64Image();

  const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${apiKey}`,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({
      model: modelId,
      messages: [
        {
          role: 'user',
          content: [
            {
              type: 'text',
              text: 'Extract ALL text from this image exactly as written. This is a food ingredient label. Output ONLY the raw text, nothing else — no commentary, no formatting, no markdown. Preserve line breaks where they appear.'
            },
            {
              type: 'image_url',
              image_url: { url: base64 }
            }
          ]
        }
      ],
      max_tokens: 1024,
      temperature: 0,
    })
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err.error?.message || `API error ${response.status}`);
  }

  const result = await response.json();
  const text = result.choices?.[0]?.message?.content?.trim();
  if (!text) throw new Error('Model returned empty response');

  // Extract cost from OpenRouter response headers or usage
  const usage = result.usage || {};
  const cost = result.usage?.total_cost
    ?? (parseFloat(response.headers.get('x-openrouter-cost') || '0') || null);

  return { text, usage, cost, model: result.model || modelId };
}

// ── Smart routing models (picked from each tier) ──
const SMART_ROUTE_TIERS = [
  { label: 'Free',     models: ['qwen/qwen2.5-vl-32b-instruct:free', 'meta-llama/llama-4-scout:free'] },
  { label: 'Low cost', models: ['qwen/qwen3-vl-8b-instruct', 'google/gemini-2.5-flash-image'] },
  { label: 'Mid range', models: ['qwen/qwen2.5-vl-72b-instruct', 'google/gemini-2.5-pro-preview-03-25'] },
];

function pickSmartModels() {
  // Use the first available model from each tier
  // (In future this could check the fetched model list)
  return SMART_ROUTE_TIERS.map(tier => ({
    label: tier.label,
    model: tier.models[0],
  }));
}

// ── Step log UI ──
const stepLog = document.getElementById('stepLog');

function clearStepLog() {
  stepLog.innerHTML = '';
  stepLog.classList.remove('visible');
}

function addStepEntry(modelId, label) {
  const entry = document.createElement('div');
  entry.className = 'step-entry running';
  entry.innerHTML = `
    <div class="step-header">
      <span class="step-model">${label}: ${modelId}</span>
      <span class="step-meta"><span class="step-time">running…</span></span>
    </div>`;
  stepLog.appendChild(entry);
  stepLog.classList.add('visible');
  return entry;
}

function updateStepEntry(entry, { elapsed, cost, found, text, error }) {
  entry.classList.remove('running');

  const meta = entry.querySelector('.step-meta');
  const parts = [`${elapsed}s`];
  if (cost !== null && cost !== undefined && cost > 0) {
    parts.push(`$${cost < 0.001 ? cost.toFixed(6) : cost.toFixed(4)}`);
  }
  meta.innerHTML = parts.map(p => `<span>${p}</span>`).join('');

  if (error) {
    entry.classList.add('error');
    const errEl = document.createElement('div');
    errEl.className = 'step-allergens';
    errEl.innerHTML = `<span class="tag found" style="border-color:#888;color:#888;background:rgba(136,136,136,0.15)">Error: ${error}</span>`;
    entry.appendChild(errEl);
    return;
  }

  if (found.length > 0) {
    entry.classList.add('found');
    const allergenDiv = document.createElement('div');
    allergenDiv.className = 'step-allergens';
    allergenDiv.innerHTML = found.map(a => `<span class="tag found">${a}</span>`).join('');
    entry.appendChild(allergenDiv);
  } else {
    entry.classList.add('clear');
    const allergenDiv = document.createElement('div');
    allergenDiv.className = 'step-allergens';
    allergenDiv.innerHTML = '<span class="tag clear">No allergens</span>';
    entry.appendChild(allergenDiv);
  }

  // Add toggle to show/hide OCR text
  const toggleBtn = document.createElement('button');
  toggleBtn.className = 'step-toggle';
  toggleBtn.textContent = 'Show recognized text';
  const textDiv = document.createElement('div');
  textDiv.className = 'step-text';
  textDiv.textContent = text;
  toggleBtn.addEventListener('click', () => {
    const open = textDiv.classList.toggle('visible');
    toggleBtn.textContent = open ? 'Hide recognized text' : 'Show recognized text';
  });
  entry.appendChild(toggleBtn);
  entry.appendChild(textDiv);
}

// ── Single model OCR ──
async function runOCR() {
  const isSmartRoute = modelSelect.value === '__smart__';
  if (isSmartRoute) return runSmartOCR();

  loader.classList.remove('hidden');
  cameraWrap.classList.remove('safe', 'danger');
  resultsEl.classList.remove('visible');
  ocrTextEl.classList.remove('visible');
  clearStepLog();
  statusEl.textContent = 'Sending image to AI for text recognition…';
  btnScan.disabled = true;
  btnRescan.classList.add('hidden');
  cachedBase64 = null;

  const t0 = performance.now();

  try {
    const { text, cost } = await recognizeText(modelSelect.value);
    const elapsed = ((performance.now() - t0) / 1000).toFixed(1);

    ocrTextEl.textContent = text;
    ocrTextEl.classList.add('visible');

    const found = findAllergens(text);
    const costStr = cost ? ` · $${cost < 0.001 ? cost.toFixed(6) : cost.toFixed(4)}` : '';

    if (found.length > 0) {
      cameraWrap.classList.add('danger');
      statusEl.textContent = `Allergens detected (${found.length})! (${elapsed}s${costStr})`;
      resultsEl.innerHTML = `<h3>Allergens found:</h3>` +
        found.map(a => `<span class="tag found">${a}</span>`).join('');
    } else {
      cameraWrap.classList.add('safe');
      statusEl.textContent = `No allergens detected. (${elapsed}s${costStr})`;
      resultsEl.innerHTML = `<h3>Result:</h3><span class="tag clear">No allergens found</span>`;
    }
    resultsEl.classList.add('visible');
  } catch (err) {
    const elapsed = ((performance.now() - t0) / 1000).toFixed(1);
    statusEl.textContent = `Error: ${err.message} (${elapsed}s)`;
  } finally {
    loader.classList.add('hidden');
    btnScan.disabled = !stream;
    btnRescan.classList.remove('hidden');
  }
}

// ── Smart routing OCR ──
async function runSmartOCR() {
  loader.classList.remove('hidden');
  cameraWrap.classList.remove('safe', 'danger');
  resultsEl.classList.remove('visible');
  ocrTextEl.classList.remove('visible');
  clearStepLog();
  statusEl.textContent = 'Smart scan: escalating through model tiers…';
  btnScan.disabled = true;
  btnRescan.classList.add('hidden');
  cachedBase64 = null;

  const tiers = pickSmartModels();
  let allergenResult = null;
  let totalCost = 0;
  const t0Global = performance.now();

  for (const tier of tiers) {
    const entry = addStepEntry(tier.model, tier.label);
    const t0 = performance.now();

    try {
      statusEl.textContent = `Smart scan: trying ${tier.label} tier (${tier.model})…`;
      const { text, cost } = await recognizeText(tier.model);
      const elapsed = ((performance.now() - t0) / 1000).toFixed(1);
      if (cost) totalCost += cost;

      const found = findAllergens(text);
      updateStepEntry(entry, { elapsed, cost, found, text });

      if (found.length > 0) {
        allergenResult = { found, text, tier: tier.label, model: tier.model };
        break; // Stop escalating — allergens found
      }
    } catch (err) {
      const elapsed = ((performance.now() - t0) / 1000).toFixed(1);
      updateStepEntry(entry, { elapsed, cost: null, found: [], text: '', error: err.message });
      // Continue to next tier on error
    }
  }

  const totalElapsed = ((performance.now() - t0Global) / 1000).toFixed(1);
  const costStr = totalCost > 0 ? ` · total $${totalCost < 0.001 ? totalCost.toFixed(6) : totalCost.toFixed(4)}` : '';

  if (allergenResult) {
    cameraWrap.classList.add('danger');
    statusEl.textContent = `Allergens found by ${allergenResult.tier} tier! (${totalElapsed}s${costStr})`;
    resultsEl.innerHTML = `<h3>Allergens found (${allergenResult.model}):</h3>` +
      allergenResult.found.map(a => `<span class="tag found">${a}</span>`).join('');
  } else {
    cameraWrap.classList.add('safe');
    statusEl.textContent = `No allergens detected across all tiers. (${totalElapsed}s${costStr})`;
    resultsEl.innerHTML = `<h3>Result:</h3><span class="tag clear">No allergens found (checked ${tiers.length} models)</span>`;
  }
  resultsEl.classList.add('visible');

  loader.classList.add('hidden');
  btnScan.disabled = !stream;
  btnRescan.classList.remove('hidden');
}

async function scanCamera() {
  captureFrame();
  await runOCR();
}

async function scanUpload(file) {
  try {
    await loadImageToCanvas(file);
    await runOCR();
  } catch (err) {
    statusEl.textContent = `Upload error: ${err.message}`;
  }
}

function reset() {
  cameraWrap.classList.remove('frozen', 'safe', 'danger');
  resultsEl.classList.remove('visible');
  ocrTextEl.classList.remove('visible');
  clearStepLog();
  btnRescan.classList.add('hidden');
  cachedBase64 = null;
  fileInput.value = '';
  statusEl.textContent = stream
    ? 'Camera ready. Point at an ingredient list and tap "Scan Camera", or upload an image.'
    : 'Upload an image to scan for allergens.';
}

// ── Events ──
btnScan.addEventListener('click', scanCamera);
btnUpload.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => {
  if (fileInput.files.length > 0) scanUpload(fileInput.files[0]);
});
btnRescan.addEventListener('click', runOCR);
btnReset.addEventListener('click', reset);

// ── Init ──
loadAllergens();
loadSettings();
startCamera();
</script>
